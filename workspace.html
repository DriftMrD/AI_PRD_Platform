    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      const s = getCurrent();
      if (!s) return;
      if (generating) { showToast('正在生成中，请稍候', 'error'); return; }

      s.messages.push({ role: 'user', content: text, time: Date.now() });
      s.updatedAt = Date.now();
      chatInput.value = '';
      await persistCurrent();
      renderMessages();

      const context = PrdForge.PrdVersions.activeMessages(s).filter(m => m.role === 'user').map((m, i) => `【第${i + 1}轮需求】\n${m.content}`).join('\n\n');
      const prompt = context + (s.prd ? '\n\n【当前 PRD 草稿，请在此基础上修改】\n' + s.prd : '');
      const prevPrd = s.prd;
      if (prevPrd) s._prdBackup = prevPrd;
      await runGenerate(s, prompt, '已收到补充，正在重新生成 PRD…');
      delete s._prdBackup;
    }

    async function saveEdit() {
      const s = getCurrent();
      if (!s) return;
      if (!isLatestSelectedVersion(s)) {
        showToast('仅最新版本可编辑', 'error');
        setPrdViewMode('preview');
        return;
      }
      const text = getPrdEditorText().trim();
      if (!text) { showToast('内容不能为空', 'error'); return; }
      s.prd = text;
      s.updatedAt = Date.now();
      const entry = PrdForge.PrdVersions.pushVersion(s, text, '手动编辑');
      if (!entry) { showToast('内容没有变化', 'error'); return; }
      entry.messageCount = s.messages.length;
      selectedVersion = entry.v;
      editDirty = false;
      editBaseline = text;
      await persistCurrent();
      setPrdViewMode('preview');
      showToast('已保存为 v' + selectedVersion, 'success');
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function getExportablePrdText(s) {
      if (!s) return '';
      if (prdViewMode === 'edit') return getPrdEditorText();
      if (prdViewMode === 'review' && pendingReview) {
        return PrdForge.PrdVersions.buildMergedText(currentHunks, diffDecisions);
      }
      const ver = PrdForge.PrdVersions.getVersion(s, selectedVersion);
      return (ver?.content ?? s.prd) || '';
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
      const s = getCurrent();
      const text = getExportablePrdText(s);
      if (!text.trim()) return;
      navigator.clipboard.writeText(text).then(() => {
        const vLabel = selectedVersion ? 'v' + selectedVersion : '';
        showToast(vLabel ? '已复制 ' + vLabel : '已复制', 'success');
      });
    });
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const s = getCurrent();
      const text = getExportablePrdText(s);
      if (!text.trim()) return;
      const blob = new Blob([text], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const vPart = selectedVersion ? '_v' + selectedVersion : '';
      a.download = 'PRD' + vPart + '_' + new Date().toISOString().slice(0, 10) + '.md';
      a.click();
      URL.revokeObjectURL(url);
      if (selectedVersion) showToast('已下载 v' + selectedVersion, 'success');
    });

    document.getElementById('feishuShareBtn').addEventListener('click', () => {
      const s = getCurrent();
      const text = getExportablePrdText(s);
      if (!text || !text.trim()) {
        showToast('没有可分享的内容', 'error');
        return;
      }
      const vLabel = selectedVersion ? 'v' + selectedVersion : '最新版本';
      const title = (s?.title || 'PRD 文档') + ' · ' + vLabel;
      const shareText = '【' + title + '】\n\n' + text;
      PrdForgeFeishu.share(API_BASE, shareText, { title, vLabel }, showToast);
    });

    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => setPrdViewMode(tab.dataset.mode));
    });
    document.getElementById('ignoreNewReviewBtn').addEventListener('click', ignoreNewVersion);
    rollbackVersionBtn?.addEventListener('click', rollbackToSelectedVersion);
    document.getElementById('acceptAllReviewBtn').addEventListener('click', acceptAllReview);
    document.getElementById('finishReviewBtn').addEventListener('click', finishReview);
    reviewPrevBtn?.addEventListener('click', () => gotoReviewHunk(-1));
    reviewNextBtn?.addEventListener('click', () => gotoReviewHunk(1));
    saveEditBtn.addEventListener('click', saveEdit);
    saveEditBarBtn.addEventListener('click', saveEdit);
    cancelEditBtn.addEventListener('click', () => {
      if (editDirty && !confirm('放弃未保存的编辑？')) return;
      editDirty = false;
      setPrdViewMode('preview');
    });
    document.addEventListener('keydown', (e) => {
      if (prdViewMode === 'review' && pendingReview) {
        if (e.key === 'ArrowDown' || (e.key === 'j' && !e.metaKey && !e.ctrlKey && !e.altKey)) {
          const tag = (e.target.tagName || '').toLowerCase();
          if (tag === 'textarea' || tag === 'input') return;
          e.preventDefault();
          gotoReviewHunk(1);
          return;
        }
        if (e.key === 'ArrowUp' || (e.key === 'k' && !e.metaKey && !e.ctrlKey && !e.altKey)) {
          const tag = (e.target.tagName || '').toLowerCase();
          if (tag === 'textarea' || tag === 'input') return;
          e.preventDefault();
          gotoReviewHunk(-1);
          return;
        }
      }
      if (prdViewMode !== 'edit') return;
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveEdit();
      }
    });

    async function init() {
      const authSession = await PrdForge.requireAuth();
      if (!authSession) return;
      await prdEditorReady;
      await PrdForge.renderAuthHeader('headerAuth');

      backLink.href = INDEX_HREF;
      const listEmptyLink = document.getElementById('listEmptyLink');
      if (listEmptyLink) listEmptyLink.href = INDEX_HREF;

      try {
        const migrated = await PrdForge.SessionStore.migrateLocalSessions();
        if (migrated > 0) showToast('已迁移 ' + migrated + ' 条本地历史到云端', 'success');
        sessions = await PrdForge.SessionStore.loadAll();
      } catch (e) {
        showToast('加载历史失败：' + e.message, 'error');
        sessions = [];
      }

      const pendingRaw = sessionStorage.getItem(PENDING_KEY);
      const urlSessionId = new URLSearchParams(location.search).get('session');

      if (pendingRaw) {
        sessionStorage.removeItem(PENDING_KEY);
        try {
          const pending = JSON.parse(pendingRaw);
          const newId = await createSession(pending);
          openSession(newId);
          const s = getCurrent();
          if (s && s.autoStart && s.status === 'pending') {
            s.autoStart = false;
            await persistCurrent();
            await runGenerate(s, s.messages[0].content);
          }
        } catch (e) {
          showToast('创建会话失败：' + e.message, 'error');
          showListView();
        }
      } else if (urlSessionId && sessions.some(s => s.id === urlSessionId)) {
        openSession(urlSessionId);
      } else {
        showListView();
      }

      // 飞书 OAuth 授权回来后，自动弹出分享弹窗
      if (window.__feishuPendingShare) {
        delete window.__feishuPendingShare;
        openPendingShare();
      }
    }

    init();
  </script>
</body>
